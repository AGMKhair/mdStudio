name: mdstudio
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.1+4

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  path: ^1.9.0
  flutter_markdown: ^0.7.3
  local_auth: ^2.2.0
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.3
  uuid: ^4.4.0
  intl: ^0.19.0
  pdf: ^3.11.1
  google_fonts: ^6.2.1
  share_plus: ^10.1.4
  file_picker: ^8.0.7
  google_mobile_ads: ^5.1.0
  in_app_purchase: ^3.2.0
  shared_preferences: ^2.5.5
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.6.0
  firebase_analytics: ^11.4.1
  firebase_crashlytics: ^4.3.1
  firebase_remote_config: ^5.5.0
  package_info_plus: ^8.1.2
  url_launcher: ^6.3.1
  connectivity_plus: ^7.2.0
  file_saver: ^0.4.0
  open_filex: ^4.7.0
  docx_creator: ^1.2.7
  firebase_storage: ^12.4.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/logo.png
